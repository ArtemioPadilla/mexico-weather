name: SMN RSS

# Scrapes the SMN (Servicio Meteorológico Nacional) site with Playwright and
# refreshes the committed feed at src/data/smn-feed.xml. The Astro endpoint
# src/pages/rss.xml.ts serves this file verbatim when it is fresh, otherwise
# it falls back to its build-time CA-based Open-Meteo derivation.

on:
  schedule:
    # Hourly, at minute 17 (offset from other crons to avoid contention).
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  # Needed to explicitly dispatch the CD workflow after a feed commit.
  # GitHub does NOT trigger workflows from pushes made with the default
  # GITHUB_TOKEN, so cd.yml (on: push) never runs after this scrape — we
  # have to kick it off ourselves via the Actions API.
  actions: write

concurrency:
  group: smn-rss
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh SMN RSS feed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/smn-rss/requirements.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('scripts/smn-rss/requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r scripts/smn-rss/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Scrape SMN and regenerate feed
        run: python scripts/smn-rss/smn_rss.py

      - name: Build per-state SMN index
        # Post-processor — scans the freshly scraped feed and emits
        # public/data/smn-by-state.json keyed by MX state slug. Consumed
        # by the <SmnAvisos> widget on every detail page.
        # Skipped when the scrape produced zero items (SMN outage): rebuilding
        # from an item-less feed would clobber the previous good index, and
        # the commit-step guard below only protects the feed file itself.
        run: |
          if grep -q '<item>' src/data/smn-feed.xml; then
            python3 scripts/build-smn-by-state.py
          else
            echo "Feed has no items — keeping previous per-state index"
          fi

      - name: Commit feed if changed
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          grep -q '<item>' src/data/smn-feed.xml || { echo "Feed has no items — skipping commit"; exit 0; }
          git add src/data/smn-feed.xml public/data/smn-by-state.json
          git diff --cached --quiet || (
            git commit -m 'chore: refresh SMN RSS feed + per-state index' &&
            git pull --rebase origin main &&
            git push &&
            echo 'committed=true' >> "$GITHUB_OUTPUT"
          )

      - name: Trigger CD deploy
        # The feed commit above is pushed with GITHUB_TOKEN, which does NOT
        # trigger cd.yml's `on: push`. Explicitly dispatch CD so the freshly
        # scraped feed actually goes live at /rss.xml. Only runs when a feed
        # commit+push actually happened (skipped when nothing changed or the
        # no-items guard exited early).
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run cd.yml
